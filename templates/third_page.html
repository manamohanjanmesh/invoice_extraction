<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1f2937, #111827); color: #d1d5db; }
        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .card { background-color: #1f2937; border: 1px solid #374151; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .detail-item { background-color: #2b3748; padding: 1rem; border-radius: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="w-full max-w-2xl p-8 rounded-xl card">
            <h1 class="text-3xl font-bold text-center mb-6 text-white">Invoice #{{ invoice.id }} Details</h1>
            
            <div class="space-y-4">
                <div class="detail-item">
                    <p class="text-sm text-gray-400">Seller Name</p>
                    <p class="font-medium text-white text-lg">{{ invoice.seller_name }}</p>
                </div>
                <div class="detail-item">
                    <p class="text-sm text-gray-400">Buyer Name</p>
                    <p class="font-medium text-white text-lg">{{ invoice.buyer_name }}</p>
                </div>
                <div class="detail-item">
                    <p class="text-sm text-gray-400">GST No / Invoice No</p>
                    <p class="font-medium text-white text-lg">{{ invoice.gst_invoice_no }}</p>
                </div>
                <div class="detail-item">
                    <p class="text-sm text-gray-400">Invoice Date</p>
                    <p class="font-medium text-white text-lg">{{ invoice.invoice_date }}</p>
                </div>
                <div class="detail-item">
                    <p class="text-sm text-gray-400">Total Amount</p>
                    <p class="font-medium text-white text-lg">{{ invoice.total_amount }}</p>
                </div>
            </div>

            <div class="mt-8 flex justify-center space-x-4">
                <a href="{{ url_for('display_all_invoices') }}" class="inline-flex items-center px-6 py-3 border border-gray-500 text-base font-medium rounded-lg text-white hover:bg-gray-700 transition duration-300">
                    Back to All Invoices
                </a>
                <a href="{{ url_for('download_pdf', invoice_id=invoice.id) }}" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 transition duration-300">
                    Download Original PDF
                </a>
            </div>
        </div>
    </div>
</body>
</html>
