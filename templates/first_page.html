<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Upload - Invoice Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1f2937, #111827); color: #d1d5db; }
        .container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background-color: #1f2937; border: 1px solid #374151; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="w-full max-w-md p-8 rounded-xl card">
            <h1 class="text-3xl font-bold text-center mb-4 text-white">Invoice Extractor</h1>
            <p class="text-center text-gray-400 mb-8">Upload a PDF invoice. The details will be extracted and saved automatically.</p>

            <form id="uploadForm" action="/extract" method="post" enctype="multipart/form-data">
                <label for="fileInput" id="uploadArea" class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-gray-600 rounded-lg cursor-pointer transition-all duration-300 hover:border-blue-500 hover:bg-gray-800">
                    <svg class="w-12 h-12 text-gray-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path></svg>
                    <p id="uploadText" class="mt-4 text-gray-400 font-medium">Drag & Drop or <span class="text-blue-400 font-semibold">Click to upload</span></p>
                    <p class="text-sm text-gray-500 mt-1">Only PDF files are allowed</p>
                </label>
                <input type="file" id="fileInput" name="file" accept=".pdf" class="hidden" required>
                <button type="submit" id="submitBtn" class="hidden"></button>
            </form>

            <div id="statusArea" class="mt-6 text-center hidden">
                <div class="inline-flex items-center px-4 py-2 bg-gray-700 text-white rounded-full">
                    <div class="spinner mr-3"></div>
                    <span>Processing Invoice... Please wait.</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const statusArea = document.getElementById('statusArea');
        const uploadText = document.getElementById('uploadText');

        // Submit form automatically when a file is chosen
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                // Show file name
                uploadText.textContent = `Selected: ${fileInput.files[0].name}`;
                // Show loading state and submit the form
                uploadForm.classList.add('hidden');
                statusArea.classList.remove('hidden');
                uploadForm.submit();
            }
        });
    </script>
</body>
</html>
